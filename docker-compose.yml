version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: edustream_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: edustream_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://edustream_kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: edustream_kafka_ui
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERS: edustream_kafka:9092
    ports:
      - "8080:8080"

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: edustream_namenode
    environment:
      CLUSTER_NAME: edustream
    ports:
      - "9870:9870"
      - "9000:9000"

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: edustream_datanode
    environment:
      SERVICE_PRECONDITION: edustream_namenode:9870
    depends_on:
      - namenode
    ports:
      - "9864:9864"
